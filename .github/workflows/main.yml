name: Deploy via FTP

on:
  push:
    branches:
      - main # Altere para a sua branch principal, se necessário

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏗️ Build Project
        run: npm run build
        env:
          # Adicione aqui as variáveis de ambiente necessárias para o build
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📂 Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # Pasta gerada pelo build do Vite
          server-dir: /public_html/ # Altere para a pasta de destino no seu servidor
          dangerous-clean-slate: false # Defina como true se quiser apagar arquivos no servidor que não estão no repositório
